services:
  - type: web
    name: mod-logger
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python mod_logger_fixed.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SPY_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: SOURCE_CHANNEL_ID
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
      - key: TARGET_USER_IDS
        sync: false
      - key: WEBHOOK_URL
        sync: false
